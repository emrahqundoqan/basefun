<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="talentapp:project_verification" content="9ff456b07b51ebe380e8353a57b67874a40154f96c73c1fb40349ae7dc0ec398a9fccd1eb1c70b49b32225da4afb77e055bdcda23fe607ff7daeaa940b132c9f">
<title>Base Fun dApp</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.0/ethers.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap');
:root{--blue:#0052FF;--blue-dark:#003dbf;--blue-light:#e6eeff;--gold:#F59E0B;--gold-light:#FEF3C7;--purple:#7C3AED;--purple-light:#EDE9FE;--green:#10B981;--green-light:#D1FAE5;--red:#EF4444;--red-light:#FEE2E2;--warn:#F59E0B;--warn-light:#FEF9C3;--bg:#fff;--bg2:#f8f8f7;--bdr:rgba(0,0,0,.10);--bdr2:rgba(0,0,0,.18);--tx:#1a1a18;--tx2:#6b6b67;--r:12px;--rs:8px;}
@media(prefers-color-scheme:dark){:root{--bg:#1a1a18;--bg2:#242421;--bdr:rgba(255,255,255,.10);--bdr2:rgba(255,255,255,.18);--tx:#f0efea;--tx2:#9c9a92;--blue-light:#0f1e3d;--gold-light:#2d1f00;--purple-light:#1e0a3c;--green-light:#042f1e;--red-light:#2d0a0a;--warn-light:#2d1f00;}}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh}
.wrap{max-width:520px;margin:0 auto;padding:24px 16px 56px}
.hdr{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding-bottom:16px;border-bottom:.5px solid var(--bdr)}
.logo{width:42px;height:42px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-txt h1{font-family:'Space Mono',monospace;font-size:17px;font-weight:700}
.hdr-txt p{font-size:12px;color:var(--tx2);margin-top:2px}
.wlt-card{background:var(--bg2);border:.5px solid var(--bdr);border-radius:var(--r);padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.wlt-info{flex:1}
.wlt-info .lbl{font-size:11px;color:var(--tx2)}
.wlt-info .adr{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;margin-top:2px}
.btn-con{background:var(--blue);color:#fff;border:none;padding:9px 16px;border-radius:var(--rs);font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.btn-con.off{background:var(--red)}
.tabs{display:flex;gap:2px;background:var(--bg2);border:.5px solid var(--bdr);border-radius:10px;padding:4px;margin-bottom:20px;overflow-x:auto;}
.tab{flex:1;padding:8px 8px;border:none;background:transparent;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;color:var(--tx2);transition:all .18s;white-space:nowrap}
.tab.on{background:var(--bg);color:var(--tx);box-shadow:0 1px 4px rgba(0,0,0,.07)}
.pane{display:none}.pane.on{display:block}
.card{background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:16px}
.ctitle{font-size:11px;font-weight:600;text-transform:uppercase;color:var(--tx2);margin-bottom:14px}
.irow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:.5px solid var(--bdr);font-size:13px}
.fbox{display:flex;justify-content:space-between;align-items:center;border-radius:var(--rs);padding:10px 14px;margin-bottom:14px;font-size:13px}
.fbox-dp{background:var(--blue-light);border:.5px solid #b3cbff}
.abtn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.abtn-dp{background:var(--blue);color:#fff}.abtn-dp:hover:not(:disabled){background:var(--blue-dark)}
.sts{margin-top:14px;padding:12px 14px;border-radius:var(--rs);font-size:13px;display:none;align-items:flex-start;gap:9px}
.sts.on{display:flex}.sts.pnd{background:var(--warn-light);color:#78350F;border:.5px solid #fcd34d}.sts.ok{background:var(--green-light);color:#065F46;border:.5px solid #6ee7b7}.sts.err{background:var(--red-light);color:#7F1D1D;border:.5px solid #fca5a5}
.spin{width:14px;height:14px;border-radius:50%;border:2px solid currentColor;border-top-color:transparent;animation:spin_anim .65s linear infinite}
@keyframes spin_anim{to{transform:rotate(360deg)}}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sc{background:var(--bg);border:.5px solid var(--bdr);border-radius:var(--r);padding:16px;text-align:center}
.sn{font-family:'Space Mono',monospace;font-size:28px;font-weight:700;line-height:1}
.sl{font-size:12px;color:var(--tx2);margin-top:6px}
.dice-masa{background:linear-gradient(145deg,#1a7a42,#0d4a28);border-radius:20px;border:8px solid #8B6914;padding:32px 20px;margin-bottom:14px;display:flex;justify-content:center;gap:40px;min-height:160px}
.dice-box{width:80px;height:80px;background:#fff;border-radius:12px;display:flex;align-items:center;justify-content:center;box-shadow:3px 4px 10px rgba(0,0,0,.4)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;z-index:9999;opacity:0;pointer-events:none;transition:opacity .2s}
.mbg.on{opacity:1;pointer-events:all}
.mdl{background:var(--bg);border-radius:16px;padding:24px;width:340px;max-width:90vw}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="logo"><svg viewBox="0 0 32 32" fill="none" width="24" height="24"><circle cx="16" cy="16" r="14" fill="#0052FF"/><path d="M16 4C9.373 4 4 9.373 4 16s5.373 12 12 12c5.435 0 10.035-3.6 11.5-8.571H16v-2.857h12.857a12 12 0 000-1.143H16v-2.857h11.5C26.035 7.6 21.435 4 16 4z" fill="white"/></svg></div>
  <div class="hdr-txt"><h1>Base Fun dApp</h1><p>Check-in & Game Center</p></div>
</div>

<div class="wlt-card">
  <div class="wlt-info"><div class="lbl">Cüzdan</div><div class="adr" id="wlt-adr">Bağlı değil</div></div>
  <button class="btn-con" id="con-btn" onclick="openModal()">Bağlan</button>
</div>

<div class="tabs">
  <button class="tab on" id="tab-checkin" onclick="switchTab('checkin')">📅 Check-in</button>
  <button class="tab" id="tab-gm" onclick="switchTab('gm')">☀️ GM/GN</button>
  <button class="tab" id="tab-game" onclick="switchTab('game')">🎲 Oyun</button>
  <button class="tab" id="tab-wheel" onclick="switchTab('wheel')">🎡 Çark</button>
</div>

<div class="pane on" id="pane-checkin">
  <div class="g2" style="margin-bottom:16px">
    <div class="sc"><div class="sn" style="color:var(--blue)" id="ck-streak">0</div><div class="sl">Günlük Seri</div></div>
    <div class="sc"><div class="sn" style="color:var(--green)" id="ck-total">0</div><div class="sl">Toplam</div></div>
  </div>
  <div class="card">
    <div class="ctitle">Günlük Takvim</div>
    <div class="irow"><span class="il">Sıfırlanma</span><span class="iv">Her gün 03:00</span></div>
    <div class="irow"><span class="il">Durum</span><span id="ck-status" class="iv">Cüzdan bekleniyor</span></div>
    <button class="abtn abtn-dp" id="ck-btn" style="margin-top:15px" onclick="doCheckIn()">📅 Check-in Yap</button>
    <div class="sts" id="ck-sts"></div>
  </div>
</div>

<div class="pane" id="pane-gm">
  <div class="card">
    <div class="ctitle">Güne Başla (GM)</div>
    <button class="abtn abtn-dp" style="background:var(--gold); color:#000" onclick="sendMsg('gm')">☀️ GM Gönder</button>
    <div class="sts" id="gm-sts"></div>
  </div>
  <div class="card">
    <div class="ctitle">Günü Bitir (GN)</div>
    <button class="abtn abtn-dp" style="background:var(--purple); color:#fff" onclick="sendMsg('gn')">🌙 GN Gönder</button>
    <div class="sts" id="gn-sts"></div>
  </div>
</div>

<div class="pane" id="pane-game">
  <div class="card">
    <div class="ctitle">Zar At (XP Kazan)</div>
    <div class="dice-masa">
      <div class="dice-box" id="d1-box"><svg id="d1-svg" width="60" height="60"></svg></div>
      <div class="dice-box" id="d2-box"><svg id="d2-svg" width="60" height="60"></svg></div>
    </div>
    <div id="dice-res" style="text-align:center; font-weight:700; margin-bottom:10px"></div>
    <button class="abtn abtn-dp" onclick="rollDice()">🎲 Zar At!</button>
    <div class="sts" id="roll-sts"></div>
  </div>
</div>

<div class="pane" id="pane-wheel">
  <div class="card" style="text-align:center">
    <div class="ctitle">Şanslı Çark</div>
    <div style="position:relative; display:inline-block; margin-bottom:15px">
      <div style="position:absolute; top:-10px; left:50%; transform:translateX(-50%); z-index:10; font-size:24px">▼</div>
      <canvas id="wheel-cv" width="300" height="300"></canvas>
    </div>
    <div id="wheel-res" style="font-weight:700; min-height:24px; margin-bottom:10px"></div>
    <button class="abtn abtn-dp" id="spin-btn" onclick="spinWheel()">🎡 Çarkı Çevir!</button>
    <div class="sts" id="wheel-sts"></div>
  </div>
</div>

<div class="mbg" id="modal-bg">
  <div class="mdl">
    <h2 style="margin-bottom:15px">Cüzdan Bağla</h2>
    <div class="wopt" onclick="connect()"><div class="wico">🦊</div><div><div class="wnm">MetaMask</div></div></div>
    <button class="mdl-cls" style="margin-top:15px; width:100%; padding:10px; border:none; background:#eee; cursor:pointer" onclick="closeModal()">Kapat</button>
  </div>
</div>
</div>

<script>
// --- KONTRAT VERİLERİN (WheelXP.sol ) ---
const SEGMENTS_XP = [10, 25, 50, 5, 30, 10, 55, 100, 15, 20, 35, 40, 60, 65, 70, 75];
const COLORS = ["#6366f1","#0ea5e9","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#f97316","#6366f1","#0ea5e9","#10b981","#f59e0b","#ef4444","#8b5cf6","#06b6d4","#f97316"];

const ADDR = {
  CHECKIN: '0xb4e5E1C7D4b0e846645F49995024D570A0A6218c',
  GM: '0xfDeb4a6C1f8a96D1817e29916047dEa53e70111E',
  GN: '0x5A4F2A0C1134efBCe9a4Debc7B000007Cdb637B9',
  WHEEL: '0x39b91858e45C33Bd6407c27449fdC773EE288cdC'
};

const ABIS = {
  CK: ["function checkIn() payable", "function userStreaks(address) view returns (uint256)", "function totalUserCheckIns(address) view returns (uint256)", "function lastCheckIn(address) view returns (uint256)"],
  MSG: ["function gm(string) payable", "function gn(string) payable"],
  WHEEL: ["function spin() payable", "event WheelSpun(address indexed player, uint8 segment, uint256 xpEarned, uint256 totalXP)"]
};

let acct, prov, sgn, wheelAngle = 0;

function switchTab(n){
  document.querySelectorAll('.tab, .pane').forEach(el=>el.classList.remove('on'));
  document.getElementById('tab-'+n).classList.add('on');
  document.getElementById('pane-'+n).classList.add('on');
  if(acct && n==='checkin') updateCKStats();
}

async function connect(){
  if(window.ethereum){
    const accounts = await window.ethereum.request({method:'eth_requestAccounts'});
    acct = accounts[0];
    prov = new ethers.BrowserProvider(window.ethereum);
    sgn = await prov.getSigner();
    document.getElementById('wlt-adr').textContent = acct.slice(0,6)+'...'+acct.slice(-4);
    closeModal();
    updateCKStats();
  }
}

// --- CHECK-IN (03:00 RESET MANTIĞI) ---
async function updateCKStats(){
  if(!acct) return;
  const ck = new ethers.Contract(ADDR.CHECKIN, ABIS.CK, prov);
  const res = await Promise.all([ck.userStreaks(acct), ck.totalUserCheckIns(acct), ck.lastCheckIn(acct)]);
  document.getElementById('ck-streak').textContent = res[0].toString();
  document.getElementById('ck-total').textContent = res[1].toString();
  
  const lastTime = Number(res[2]);
  const now = new Date();
  
  // Sıfırlanma zamanını (Bugün 03:00) hesapla
  let resetTime = new Date();
  resetTime.setHours(3, 0, 0, 0);
  if(now < resetTime) resetTime.setDate(resetTime.getDate() - 1); // Henüz 03:00 geçmediyse dün 03:00 baz alınır
  
  const canCheckIn = (lastTime * 1000) < resetTime.getTime();
  document.getElementById('ck-status').textContent = canCheckIn ? "Bekliyor ⏳" : "Bugün Yapıldı ✅";
  document.getElementById('ck-btn').disabled = !canCheckIn;
}

async function doCheckIn(){
  setSts('ck-sts','pnd','Onaylanıyor...');
  try {
    const ck = new ethers.Contract(ADDR.CHECKIN, ABIS.CK, sgn);
    const tx = await ck.checkIn({value: ethers.parseEther('0.00001')});
    await tx.wait();
    setSts('ck-sts','ok','Başarılı!');
    updateCKStats();
  } catch(e) { setSts('ck-sts','err','Hata!'); }
}

async function sendMsg(type){
  setSts(type+'-sts','pnd','Gönderiliyor...');
  try {
    const contract = new ethers.Contract(type==='gm'?ADDR.GM:ADDR.GN, ABIS.MSG, sgn);
    const tx = await contract[type]("", {value: ethers.parseEther('0.00001')});
    await tx.wait();
    setSts(type+'-sts','ok','Mesaj Gönderildi!');
  } catch(e) { setSts(type+'-sts','err','Hata!'); }
}

// --- ÇARK (4 SANİYE ANİMASYON & HİZALAMA) ---
function drawWheel(angle){
  const cv = document.getElementById('wheel-cv'), ctx = cv.getContext('2d'), W=300, cx=150;
  ctx.clearRect(0,0,W,W);
  const step = Math.PI * 2 / 16;
  for(let i=0; i<16; i++){
    ctx.beginPath(); ctx.moveTo(cx,cx); ctx.arc(cx,cx,cx-5, angle + i*step, angle + (i+1)*step);
    ctx.fillStyle = COLORS[i]; ctx.fill(); ctx.stroke();
    // XP Yazısı
    ctx.save(); ctx.translate(cx,cx); ctx.rotate(angle + i*step + step/2);
    ctx.fillStyle='#fff'; ctx.font='bold 12px DM Sans'; ctx.fillText(SEGMENTS_XP[i]+" XP", 90, 5); ctx.restore();
  }
}

async function spinWheel(){
  if(!acct) return openModal();
  const btn = document.getElementById('spin-btn');
  btn.disabled = true;
  setSts('wheel-sts','pnd','İşlem imzalanıyor...');
  try {
    const c = new ethers.Contract(ADDR.WHEEL, ABIS.WHEEL, sgn);
    const tx = await c.spin({value: ethers.parseEther('0.00005')});
    setSts('wheel-sts','pnd','Sonuç bekleniyor...');
    const receipt = await tx.wait();
    
    // Logdan kazanan segmenti al [cite: 1]
    const log = c.interface.parseLog(receipt.logs[0]);
    const winIdx = Number(log.args[1]);
    
    // Animasyon Parametreleri
    const duration = 4000;
    const startTs = performance.now();
    const extraSpins = 5 * Math.PI * 2; // En az 5 tam tur
    
    // Duracağı açıyı hesapla: Pointer üstte (-PI/2), saat yönünde dönüş
    // Segmentin tam ortasına gelmesi için winIdx * step + step/2 kullanılır.
    const step = Math.PI * 2 / 16;
    const targetAngle = - (winIdx * step + step/2) - (Math.PI / 2);
    const totalRotation = extraSpins + (targetAngle - wheelAngle % (Math.PI*2));
    const startAngle = wheelAngle;

    function animate(now){
      const elapsed = now - startTs;
      const progress = Math.min(elapsed / duration, 1);
      const ease = 1 - Math.pow(1 - progress, 3); // Yavaşlayarak durma (OutCubic)
      wheelAngle = startAngle + totalRotation * ease;
      drawWheel(wheelAngle);
      if(progress < 1) requestAnimationFrame(animate);
      else {
        document.getElementById('wheel-res').textContent = `🎉 Tebrikler! ${SEGMENTS_XP[winIdx]} XP Kazandın!`;
        setSts('wheel-sts','ok',`+${SEGMENTS_XP[winIdx]} XP eklendi.`);
        btn.disabled = false;
      }
    }
    requestAnimationFrame(animate);
  } catch(e) { setSts('wheel-sts','err','İşlem başarısız.'); btn.disabled=false; }
}

function openModal(){ document.getElementById('modal-bg').classList.add('on'); }
function closeModal(){ document.getElementById('modal-bg').classList.remove('on'); }
function setSts(id,t,h){
  const el = document.getElementById(id);
  el.className = 'sts on '+t;
  el.innerHTML = (t==='pnd'?'<div class="spin"></div>':'')+'<span>'+h+'</span>';
}

window.onload = () => { drawWheel(0); };
</script>
</body>
</html>
